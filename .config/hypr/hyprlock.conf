input-field {
    monitor =
    size = 400, 40
    position = 0, 100
    halign = center
    valign = bottom

    inner_color = $inner_color
    outer_color = rgba(189, 189, 189 ,1)
    outline_thickness = 2

    font_family = Adwaita Mono
    font_color = rgb(229,229,229)
    placeholder_text = 
    check_color = rgb(249,100,0)

    dots_size = 0.5
    dots_spacing = 0.35
    dots_rounding = 5
    dots_center = true
   
    rounding = 3
    shadow_passes = 1
    fade_on_empty = false
}

animations {
    enabled = true
    # instant appear/disappear if you want no fade
    animation = fadeIn,  0, 5, default
    animation = fadeOut, 0, 5, default
}

# CURRENT SONG
label {
    monitor =
    text = cmd[update:1000] echo "$(~/.config/hypr/scripts/songdetail.sh)"
    color = rgb(229, 229, 229)
    font_size = 18
    font_family = URW Gothic
    position = 0, 40
    halign = center
    valign = bottom
}
