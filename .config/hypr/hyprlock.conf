# ─── Define variables first (fixes "cannot parse as int") ───
$color       = rgba(000000cc)     # fallback bg if image fails; semi-transparent black
$inner_color = rgb(e5e5e5)     # input field background (semi-transparent white)
$font_color  = rgb(000000)        # text / dots color (your 189,189,189)

general {
  hide_cursor = true 
  ignore_empty_input = true
}

background {
    monitor =
    color = $color
# Initial image – use one that definitely loads (hardcoded test)
    path = /home/v/.config/hypr/Pupsiki/eos2.jpeg   # or eos2.jpeg, wallhavennnn.png – pick one that works

    color = rgba(000000cc)   # fallback if image fails or while loading

    # Command must output ONLY the clean path (no trailing newline!)
    reload_cmd = printf '%s' "$HOME/.config/hypr/Pupsiki/$(cat "$HOME/.last_wallpaper" | tr -d '[:space:]\n\r\t')"

    # Reload every 30 seconds (adjust as needed; 0 = manual via signal only)
    reload_time = 0

    # Optional: nice fade between old/new image
    crossfade_time = 400   # milliseconds, 0 = instant
    blur_size = 4
    blur_passes = 1 # 0 disables blurring
    noise = 0.02
    contrast = 1.4000 # Vibrant!!!
    brightness = 1.0000
    vibrancy = 0.2500
    vibrancy_darkness = 0.0
}

animations {
    enabled = true
}

# TIME
label {
  monitor = 
  text = cmd[update:1000] echo "$(date +"%-I-%M")"
  font_family = Osaka-Sans Serif
  color = rgb(e5e5e5)
  font_size = 64
  position = 0, -270
  #halign = dots_center
  valign = center
  halign = center
  zindex = 1
}

input-field {
    monitor =
    size = 300, 40
    position = 0, -350
    halign = center
    valign = center

    inner_color = $inner_color
    outer_color = rgba(189, 189, 189 ,1)
    outline_thickness = 2

    font_family = Adwaita Mono
    font_color = $font_color
    placeholder_text = 
    check_color = rgb(249,100,0)

    dots_size = 0.35
    dots_spacing = 0.35
    dots_rounding = -2
    dots_center = true
   
    rounding = 2
    shadow_passes = 0
    fade_on_empty = false
}

animations {
    enabled = true
    # instant appear/disappear if you want no fade
    animation = fadeIn,  0, 5, default
    animation = fadeOut, 0, 5, default
}
