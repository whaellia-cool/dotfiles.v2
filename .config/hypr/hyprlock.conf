source = ~/.config/hypr/hyprlock_wallpaper.conf

$color       = rgba(000000cc)     # fallback bg if image fails; semi-transparent black
$inner_color = rgba(229, 229, 229, 0)     # input field background (semi-transparent white)
$font_color  = rgb(000000)        # text / dots color (your 189,189,189)

general {
  hide_cursor = true 
  ignore_empty_input = true
}

background {
    monitor =
    color = $color
    path = $wallpaper

    crossfade_time = 400 
    blur_size = 4
    blur_passes = 1 
    noise = 0.02
    contrast = 1.4000
    brightness = 1.0000
    vibrancy = 0.2500
    vibrancy_darkness = 0.0
}

animations {
    enabled = true
}

# Time-Hour
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%I")</span>"
    color = rgba(255, 255, 255, 1)
    font_size = 125
    font_family = Osaka-Sans Serif
    position = -40, 120
    halign = center
    valign = center
}

# Time-Minute
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%M")</span>"
    color = rgb(cc1b21)
    font_size = 125
    #font_family = StretchPro
    font_family = Osaka-Sans Serif
    position = 40, 0
    halign = center
    valign = center
}

